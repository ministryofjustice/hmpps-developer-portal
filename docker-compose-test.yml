version: '3.1'
services:

  redis:
    image: 'redis:7.4'
    networks:
      - hmpps_int
    ports:
      - '6379:6379'

  wiremock:
    image: wiremock/wiremock:3.13.2
    networks:
    - hmpps_int
    container_name: wiremock
    restart: always
    ports:
      - "9091:8080"
    volumes:
      - ./docker/wiremock/mappings:/home/wiremock/mappings
    environment:
      WIREMOCK_SERVICE_CATALOGUE_URL: ${WIREMOCK_SERVICE_CATALOGUE_URL:-https://service-catalogue-dev.hmpps.service.justice.gov.uk}
      WIREMOCK_ALERTMANAGER_URL: ${WIREMOCK_ALERTMANAGER_URL:-http://monitoring-alerts-service.cloud-platform-monitoring-alerts:8080/alertmanager}
    command: --global-response-templating

networks:
  hmpps_int:
